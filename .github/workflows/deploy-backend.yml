name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Build jar
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/target/*.jar"
          target: "/home/ec2-user/"
          strip_components: 2

      - name: Write environment secrets to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL:        ${{ secrets.DB_URL }}
          DB_USERNAME:   ${{ secrets.DB_USERNAME }}
          DB_PASSWORD:   ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:    ${{ secrets.JWT_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_URL,DB_USERNAME,DB_PASSWORD,JWT_SECRET,MAIL_USERNAME,MAIL_PASSWORD
          script: |
            cat > /home/ec2-user/ipl.env <<EOF
            DB_URL=$DB_URL
            DB_USERNAME=$DB_USERNAME
            DB_PASSWORD=$DB_PASSWORD
            JWT_SECRET=$JWT_SECRET
            MAIL_USERNAME=$MAIL_USERNAME
            MAIL_PASSWORD=$MAIL_PASSWORD
            EOF
            chmod 600 /home/ec2-user/ipl.env

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Fix 1: rename only the newly uploaded jar (not app.jar itself)
            NEW_JAR=$(find /home/ec2-user -maxdepth 1 -name "*.jar" ! -name "app.jar" | head -1)
            mv "$NEW_JAR" /home/ec2-user/app.jar

            # Fix 2: reload unit file if it changed, then restart
            sudo systemctl daemon-reload
            sudo systemctl restart ipl

            # Wait then confirm service is still up
            sleep 20
            sudo systemctl is-active --quiet ipl || (sudo journalctl -u ipl -n 50 --no-pager && exit 1)

      - name: Verify deployed commit matches HEAD
        run: |
          EXPECTED=$(git rev-parse --short HEAD)
          echo "Expected commit: $EXPECTED"

          # Retry for up to 90s; --max-time 5 ensures each attempt fails
          # fast instead of hanging when the port is temporarily unreachable
          for i in $(seq 1 9); do
            RESPONSE=$(curl -s --max-time 5 --connect-timeout 5 \
              http://${{ secrets.EC2_HOST }}:8080/actuator/info)
            if [ -n "$RESPONSE" ]; then
              break
            fi
            echo "App not ready yet, retrying in 10s (attempt $i/9)..."
            sleep 10
          done

          if [ -z "$RESPONSE" ]; then
            echo "ERROR: /actuator/info returned empty after 60s"
            exit 1
          fi

          DEPLOYED=$(echo "$RESPONSE" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['git']['commit']['id']['abbrev'])")
          echo "Deployed commit: $DEPLOYED"

          if [ "$DEPLOYED" = "$EXPECTED" ]; then
            echo "Deployment verified — correct commit is live."
          else
            echo "ERROR: deployed commit ($DEPLOYED) does not match HEAD ($EXPECTED)"
            exit 1
          fi
