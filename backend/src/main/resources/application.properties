# Server
server.port=8080

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.com.ipl=DEBUG

server.error.include-stacktrace=always
server.error.include-message=always

# Active profile (local by default)
spring.profiles.active=local

# ── JWT ────────────────────────────────────────────────────────────────────────
# Secret must be a Base64-encoded string of at least 256 bits (32 bytes).
# Generate with: openssl rand -base64 32
jwt.secret=CHANGE_ME_USE_openssl_rand_base64_32_output_here_must_be_32_bytes
jwt.expiration=900000
# Refresh token validity in days
jwt.refresh-expiration-days=7

# ── Mail (SMTP) ────────────────────────────────────────────────────────────────
# Configure your SMTP provider below. Example uses Gmail App Password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=CHANGE_ME_your_email@gmail.com
spring.mail.password=CHANGE_ME_your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App ────────────────────────────────────────────────────────────────────────
app.frontend-url=http://localhost:5173