# ── Database ───────────────────────────────────────────────────────────────────
# Values injected at runtime from environment variables (set by GitHub Actions
# deployment workflow into /home/ec2-user/ipl.env, loaded by systemd).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging (quieter in prod) ──────────────────────────────────────────────────
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO
logging.level.com.ipl=INFO
server.error.include-stacktrace=never
server.error.include-message=always
logging.file.name=/var/log/ipl-dashboard.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration-days=7

# ── Mail ───────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App ────────────────────────────────────────────────────────────────────────
app.frontend-url=http://ipl-dashboard-saikiran.s3-website-us-east-1.amazonaws.com
